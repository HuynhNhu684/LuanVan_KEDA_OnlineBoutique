apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator
spec:
  replicas: 1  # 
  selector:
    matchLabels:
      app: load-generator
  template:
    metadata:
      labels:
        app: load-generator
    spec:
      containers:
      - name: hey
        image: williamyeh/hey
        args: ["-z", "20m", "-c", "200", "http://frontend"]
